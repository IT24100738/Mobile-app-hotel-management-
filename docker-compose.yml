version: '3.9'
services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/hotel_management
      JWT_SECRET: change_me
      CORS_ORIGIN: http://localhost:8081,http://localhost:19006
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 500

volumes:
  mongo_data:
